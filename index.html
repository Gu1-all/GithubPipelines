<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0e0e0e;
      --card-bg: #161616;
      --border: #2a2a2a;
      --accent: #c8f564;
      --text: #f0f0f0;
      --muted: #555;
    }

    body {
      background-color: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(200, 245, 100, 0.04) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(200, 245, 100, 0.03) 0%, transparent 50%);
    }

    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 56px 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 24px 64px rgba(0, 0, 0, 0.6);
    }

    .label {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    h1 span {
      color: var(--accent);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="label">Guilherme Pinheiro</span>
    <h1>Hello <span>World!</span></h1>
    <div class="dot"></div>
  </div>
</body>
</html>
